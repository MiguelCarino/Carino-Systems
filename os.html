    function getRandomElement(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function updateForegroundContent() {
        const row1Key = selectedButtons.row1;
        const foregroundImageSrc = getRandomElement(foregroundImages[row1Key]);
        foregroundImage.src = foregroundImageSrc;

        secondButton.onclick = () => {
            navigator.clipboard.writeText(setupScripts[row1Key]).then(() => {
                alert('Text copied to clipboard');
            });
        };

        foregroundImage.classList.add('active');
    }

    function updateMiddleContent() {
        const row1Key = selectedButtons.row1;
        const middleImageSrc = getRandomElement(middleImages[row1Key]);
        mainImage.src = middleImageSrc;

        mainImage.classList.add('active');
    }

    function updateBackgroundContent() {
        const row1Key = selectedButtons.row1;
        const backgroundImageSrc = getRandomElement(backgroundImages[row1Key]);
        backgroundImage.src = backgroundImageSrc;

        backgroundImage.classList.add('active');
    }

    function updateDownloadLink() {
        const permutationKey = `${selectedButtons.row1}-${selectedButtons.row2}-${selectedButtons.row3}`;
        const downloadLink = downloadLinks[permutationKey];

        if (downloadLink) {
            firstButton.onclick = () => window.open(downloadLink, '_blank');
        } else {
            firstButton.onclick = null;
        }
    }

    function downloadCombinedImage() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1920;
        canvas.height = 1080;

        const images = [
            backgroundImage,
            mainImage,
            foregroundImage
        ];

        const loadImage = (img) => {
            return new Promise((resolve) => {
                if (img.src) {
                    const image = new Image();
                    image.crossOrigin = 'anonymous';
                    image.src = img.src;
                    image.onload = () => resolve(image);
                } else {
                    resolve(null);
                }
            });
        };

        Promise.all(images.map(loadImage)).then((loadedImages) => {
            loadedImages.forEach((image) => {
                if (image) {
                    ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
                }
            });

            const dataURL = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.href = dataURL;
            link.download = 'combined-image.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    }

        button.addEventListener('click', () => {

            const index = button.getAttribute('data-index');

            selectedButtons[`row${row}`] = index;

            buttons.forEach(btn => {
                if (btn.getAttribute('data-row') === row) {
                    btn.classList.remove('active');
                }
            });

            button.classList.add('active');

            if (row === '1') {
                updateForegroundContent();
            } else if (row === '2') {
                updateMiddleContent();
            } else if (row === '3') {
                updateBackgroundContent();
            }
            updateDownloadLink(); // Ensure download link is updated for any button press
        });
    });
