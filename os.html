<style>
    /* Basic styles for the body and main layout */
    body, main, header, h1, section, #banner, div#inner, container, button {
        font-family: HomeVideo;
    }
    .selectionDiv {
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100%;
        background-color: #f0f0f000;
    }

    .container-75vh {
        max-width: 100%;
        display: flex;
        width: 100%;
        height: 67vh;
        border: 1px solid #ccc;
        overflow: hidden;
        transition: height 0.3s ease-in-out;
    }

    .container-50vh {
        max-width: 100%;
        display: flex;
        width: 100%;
        height: 62vh;
        border: 1px solid #ccc;
        overflow: hidden;
        transition: height 0.3s ease-in-out;
    }

    .section {
        position: relative;
        width: 25%;
        overflow: hidden;
        transition: transform 0.3s;
        cursor: pointer;
        flex: 1;
    }

    .section img {
        width: 100%;
        height: calc(100% - 40px);
        object-fit: cover;
    }

    .section p {
        height: 40px;
        margin: 0;
        padding: 10px;
        background: rgba(0, 0, 0, 0.5);
        color: white;
        position: absolute;
        bottom: 0;
        width: 100%;
        text-align: center;
        font-size: 1.2em;
    }

    /*.section:nth-child(1) {
        clip-path: polygon(0% 0, 100% 0, 94% 100%, 0 100%);
    }*/

    .section:nth-child(n) {
        clip-path: polygon(6% 0, 100% 0, 94% 100%, 0 100%);
    }

    /*.section:nth-child(4) {
        clip-path: polygon(6% 0, 100% 0, 100% 100%, 0 100%);
    }*/

    .section:hover {
        transform: scale(0.96);
    }

    .hidden {
        display: none;
    }

    .visible {
        display: flex;
        animation: popUp 0.3s forwards;
    }

    @keyframes popUp {
        from {
            transform: scale(0);
            opacity: 0;
        }

        to {
            transform: scale(1);
            opacity: 1;
        }
    }

    .hidden-container {
        display: flex;
        flex-direction: column;
        width: 100%;
        overflow: hidden;
    }

    .secondary-hidden-container {
        display: none;
        width: 100%;
        height: 18vh;
        justify-content: center;
        align-items: center;
        background-color: #f9f9f900;
        border: 2px solid #007bff;
        transition: height 0.3s ease-in-out;
        padding: 20px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .code-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
    }

    .code-container pre {
        background: rgba(0, 0, 0, 0)
        padding: 20px;
        border: 1px solid #ccc;
        width: 80%;
        overflow: auto;
        font-size: 1.2em;
        margin-bottom: 10px;
    }

    .copy-button {
        padding: 10px 20px;
        background-color: #007bff;
        color: #fff;
        border: none;
        cursor: pointer;
        font-size: 1em;
        border-radius: 5px;
        transition: background-color 0.3s ease;
    }

    .copy-button:hover {
        background-color: #0056b3;
    }
</style>

<!-- Scripts -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
    const setupScripts = {
        'Windows': 'iwr -useb https://carino.systems/setup.ps1 | iex',
        'macOS': '#',
        'Linux': 'bash <(curl -s https://carino.systems/setup.sh)',
        'BSD': 'bash <(curl -s https://carino.systems/setup.sh)'
    };

    let activeSecondaryContainer;

    function copyCode(elementId) {
        const code = document.getElementById(elementId).innerText;
        navigator.clipboard.writeText(code).then(() => {
            alert('Code copied to clipboard!');
        });
    }

    document.querySelectorAll('#mainContainer .section').forEach(section => {
        section.addEventListener('click', () => {
            const parentContainer = document.getElementById('mainContainer');
            const target = section.getAttribute('data-target');
            const targetContainer = document.getElementById(target);

            if (targetContainer.classList.contains('visible')) {
                parentContainer.style.height = '72vh';
                document.querySelectorAll('.hidden-container .container-50vh').forEach(container => {
                    container.classList.add('hidden');
                    container.classList.remove('visible');
                    container.style.height = '50vh';
                });
                document.querySelectorAll('.secondary-hidden-container').forEach(container => {
                    container.style.display = 'none';
                });
                activeSecondaryContainer = null;
                return;
            }

            parentContainer.style.height = '5vh';
            document.querySelectorAll('.secondary-hidden-container').forEach(container => {
                container.style.display = 'none';
            });
            document.querySelectorAll('.hidden-container .container-50vh').forEach(container => {
                container.classList.add('hidden');
                container.classList.remove('visible');
            });

            targetContainer.classList.remove('hidden');
            targetContainer.classList.add('visible');

            activeSecondaryContainer = section.getAttribute('data-secondary');
            const scriptKey = section.querySelector('p').innerText.trim();
            document.getElementById(activeSecondaryContainer).querySelector('pre').innerText = setupScripts[scriptKey];

            const sections = targetContainer.querySelectorAll('.section');
            const sectionWidth = 100 / sections.length;
            sections.forEach(sec => {
                sec.style.width = sectionWidth + '%';
            });
        });
    });

    document.querySelectorAll('.hidden-container .section').forEach(section => {
        section.addEventListener('click', () => {
            const parentContainer = section.closest('.container-50vh');
            parentContainer.style.height = '44vh';

            document.querySelectorAll('.secondary-hidden-container').forEach(container => {
                container.style.display = 'none';
            });

            const secondaryHiddenContainer = document.getElementById(activeSecondaryContainer);
            secondaryHiddenContainer.style.display = 'flex';
        });
    });
});

</script>
