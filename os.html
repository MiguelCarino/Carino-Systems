    <!-- Scripts -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const buttons = document.querySelectorAll('.btn');
            const mainImage = document.getElementById('img-main');
            const backgroundImage = document.getElementById('img-background');
            const foregroundImage = document.getElementById('img-foreground');
            const imageBoxContainer = document.getElementById('imageBoxContainer');
            const textMain = document.getElementById('text-main');
            const textBackground = document.getElementById('text-background');
            const firstButton = document.getElementById('firstButton');
            const secondButton = document.getElementById('secondButton');
            
            // Ensure the first buttons of each row are selected by default
            let selectedButtons = { row1: 'Windows', row2: 'Work', row3: 'Taskbar' };

            const data = {
                'Windows-Work': [
                    { image: 'images/os/Windows.svg', foregroundImage: 'images/os/Linux.svg', text: '', link: 'https://www.microsoft.com/en-us/software-download/windows11/' }
                ],
                'Windows-Gaming': [
                    { image: 'Windows.svg', foregroundImage: 'Linux.svg', text: '', link: 'https://www.microsoft.com/en-us/software-download/windows11/' }
                ],
                'Windows-Server': [
                    { image: 'Windows.svg', foregroundImage: 'Linux.svg', text: '', link: 'https://www.microsoft.com/en-US/evalcenter/evaluate-windows-server-2022' }
                ],
                'Windows-Enthusiast': [
                    { image: 'Windows.svg', foregroundImage: 'Linux.svg', text: '', link: 'https://www.microsoft.com/en-us/software-download/windows11/' }
                ],
                'macOS-Work': [
                    { image: 'macos.svg', text: 'Main text for macOS-Work (A)', link: 'https://example.com/macos-work-a' },
                    { image: 'path_to_image_macos_work_b.jpg', text: 'Main text for macOS-Work (B)', link: 'https://example.com/macos-work-b' }
                ],
                'macOS-Gaming': [
                    { image: 'macos.svg', text: 'Main text for macOS-Gaming (A)', link: 'https://example.com/macos-gaming-a' },
                    { image: 'path_to_image_macos_gaming_b.jpg', text: 'Main text for macOS-Gaming (B)', link: 'https://example.com/macos-gaming-b' }
                ],
                'macOS-Server': [
                    { image: 'macos.svg', text: 'Main text for macOS-Server (A)', link: 'https://example.com/macos-server-a' },
                    { image: 'macos.svg', text: 'Main text for macOS-Server (B)', link: 'https://example.com/macos-server-b' }
                ],
                'macOS-Enthusiast': [
                    { image: 'macos.svg', text: 'Main text for macOS-Enthusiast (A)', link: 'https://example.com/macos-enthusiast-a' },
                    { image: 'path_to_image_macos_enthusiast_b.jpg', text: 'Main text for macOS-Enthusiast (B)', link: 'https://example.com/macos-enthusiast-b' }
                ],
                'Linux-Work': [
                    { image: 'path_to_image_linux_work_a.jpg', text: 'Main text for Linux-Work (A)', link: 'https://example.com/linux-work-a' },
                    { image: 'path_to_image_linux_work_b.jpg', text: 'Main text for Linux-Work (B)', link: 'https://example.com/linux-work-b' }
                ],
                'Linux-Gaming': [
                    { image: 'path_to_image_linux_gaming_a.jpg', text: 'Main text for Linux-Gaming (A)', link: 'https://example.com/linux-gaming-a' },
                    { image: 'path_to_image_linux_gaming_b.jpg', text: 'Main text for Linux-Gaming (B)', link: 'https://example.com/linux-gaming-b' }
                ],
                'Linux-Server': [
                    { image: 'path_to_image_linux_server_a.jpg', text: 'Main text for Linux-Server (A)', link: 'https://example.com/linux-server-a' },
                    { image: 'path_to_image_linux_server_b.jpg', text: 'Main text for Linux-Server (B)', link: 'https://example.com/linux-server-b' }
                ],
                'Linux-Enthusiast': [
                    { image: 'path_to_image_linux_enthusiast_a.jpg', text: 'Main text for Linux-Enthusiast (A)', link: 'https://example.com/linux-enthusiast-a' },
                    { image: 'path_to_image_linux_enthusiast_b.jpg', text: 'Main text for Linux-Enthusiast (B)', link: 'https://example.com/linux-enthusiast-b' }
                ],
                'BSD-Work': [
                    { image: 'path_to_image_bsd_work_a.jpg', text: 'Main text for BSD-Work (A)', link: 'https://example.com/bsd-work-a' },
                    { image: 'path_to_image_bsd_work_b.jpg', text: 'Main text for BSD-Work (B)', link: 'https://example.com/bsd-work-b' }
                ],
                'BSD-Gaming': [
                    { image: 'path_to_image_bsd_gaming_a.jpg', text: 'Main text for BSD-Gaming (A)', link: 'https://example.com/bsd-gaming-a' },
                    { image: 'path_to_image_bsd_gaming_b.jpg', text: 'Main text for BSD-Gaming (B)', link: 'https://example.com/bsd-gaming-b' }
                ],
                'BSD-Server': [
                    { image: 'path_to_image_bsd_server_a.jpg', text: 'Main text for BSD-Server (A)', link: 'https://example.com/bsd-server-a' },
                    { image: 'path_to_image_bsd_server_b.jpg', text: 'Main text for BSD-Server (B)', link: 'https://example.com/bsd-server-b' }
                ],
                'BSD-Enthusiast': [
                    { image: 'path_to_image_bsd_enthusiast_a.jpg', text: 'Main text for BSD-Enthusiast (A)', link: 'https://example.com/bsd-enthusiast-a' },
                    { image: 'path_to_image_bsd_enthusiast_b.jpg', text: 'Main text for BSD-Enthusiast (B)', link: 'https://example.com/bsd-enthusiast-b' }
                ]
            };

            const backgroundData = {
                'Taskbar': [
                    { image: 'images/os/Taskbar.webp', text: 'Background text for Taskbar (A)' }
                ],
                'Dock': [
                    { image: 'Dock.webp', text: 'Background text for Dock (A)' }
                ],
                'Tiling': [
                    { image: 'Redhat.svg', text: 'Background text for Tiling (A)' },
                    { image: 'path_to_tiling_windows_b.jpg', text: 'Background text for Tiling (B)' }
                ],
                'CLI': [
                    { image: 'Linux.svg', text: 'Background text for CLI (A)' },
                    { image: 'path_to_cli_windows_b.jpg', text: 'Background text for CLI (B)' }
                ]
            };

            function getRandomElement(arr) {
                return arr[Math.floor(Math.random() * arr.length)];
            }

            function updateImagesAndTexts() {
                const mainKey = `${selectedButtons.row1}-${selectedButtons.row2}`;

                const mainContent = getRandomElement(data[mainKey]);

                if (mainContent) {
                    mainImage.src = mainContent.image;
                    foregroundImage.src = mainContent.foregroundImage; // Assuming mainContent has foregroundImage property
                    textMain.innerHTML = mainContent.text.replace(/\n/g, '<br>');
                    firstButton.onclick = () => window.open(mainContent.link, '_blank');
                } else {
                    mainImage.src = '';
                    foregroundImage.src = ''; // Clear foreground image
                    textMain.innerHTML = 'Main text will appear here';
                    firstButton.onclick = null;
                }

                mainImage.classList.add('active');
                foregroundImage.classList.add('active'); // Activate the foreground image
            }

            function updateBackgroundContent() {
                const style = selectedButtons.row3;
                const backgroundContent = getRandomElement(backgroundData[style]);

                if (backgroundContent) {
                    backgroundImage.src = backgroundContent.image;
                    textBackground.innerHTML = backgroundContent.text.replace(/\n/g, '<br>');
                    secondButton.onclick = () => {
                        navigator.clipboard.writeText(backgroundContent.text).then(() => {
                            alert(`Copied to clipboard: ${backgroundContent.text}`);
                        });
                    };
                } else {
                    backgroundImage.src = '';
                    textBackground.innerHTML = 'Background text will appear here';
                    secondButton.onclick = null;
                }

                backgroundImage.classList.add('active');
            }

            function downloadCombinedImage() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 1920;
                canvas.height = 1080;

                const images = [
                    backgroundImage,
                    mainImage,
                    foregroundImage
                ];

                let imagesLoaded = 0;

                images.forEach((img) => {
                    if (img.src) {
                        const image = new Image();
                        image.crossOrigin = 'anonymous';
                        image.src = img.src;

                        image.onload = () => {
                            ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
                            imagesLoaded++;

                            if (imagesLoaded === images.length) {
                                const dataURL = canvas.toDataURL('image/png');
                                const link = document.createElement('a');
                                link.href = dataURL;
                                link.download = 'combined-image.png';
                                document.body.appendChild(link);
                                link.click();
                                document.body.removeChild(link);
                            }
                        };
                    } else {
                        imagesLoaded++;
                    }
                });
            }

            buttons.forEach(button => {
                button.addEventListener('click', () => {
                    const row = button.getAttribute('data-row');
                    const index = button.getAttribute('data-index');

                    selectedButtons[`row${row}`] = index;

                    buttons.forEach(btn => {
                        if (btn.getAttribute('data-row') === row) {
                            btn.classList.remove('active');
                        }
                    });

                    button.classList.add('active');

                    if (row === '1' || row === '2') {
                        updateImagesAndTexts();
                    } else if (row === '3') {
                        updateBackgroundContent();
                    }
                });
            });

            // Set initial states and update content
            document.querySelector('[data-row="1"][data-index="Windows"]').classList.add('active');
            document.querySelector('[data-row="2"][data-index="Work"]').classList.add('active');
            document.querySelector('[data-row="3"][data-index="Taskbar"]').classList.add('active');
            updateImagesAndTexts();
            updateBackgroundContent();

            imageBoxContainer.addEventListener('click', downloadCombinedImage);
        });
    </script>
